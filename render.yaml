# Blueprint: https://render.com/docs/blueprint-spec
# After deploy, set GitHub repo variable VITE_API_URL to the service URL (no trailing slash).
services:
  - type: web
    name: mci-api
    runtime: node
    rootDir: back
    plan: free
    buildCommand: npm ci --include=dev && npx prisma migrate deploy && npm run build && npx prisma db seed
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./data.db
      - key: CORS_ORIGINS
        sync: false
